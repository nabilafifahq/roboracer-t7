ackermann_mux:
  ros__parameters:
    topics:
      # Autonomy (wall_follow_node) publishes AckermannDriveStamped here:
      navigation:
        topic: /drive
        timeout: 0.2
        priority: 10

      # Derek Nav2 vector pursuit (twist_to_ackermann) — autonomy:=raceline / nav2_vector_pursuit:
      nav2:
        topic: /nav2_cmd_ackermann
        timeout: 0.2
        priority: 50

      # Joystick teleop publishes AckermannDriveStamped here (manual override):
      joystick:
        topic: /teleop
        timeout: 0.2
        priority: 100
