pointcloud_to_laserscan:
  ros__parameters:
    target_frame: base_link
    transform_tolerance: 0.05

    # Keep points near wall height and reject floor/ceiling clutter.
    min_height: -0.15
    max_height: 0.35

    # Front-facing 180 deg scan for indoor hallway driving.
    angle_min: -1.5708
    angle_max: 1.5708
    angle_increment: 0.00872665
    scan_time: 0.1

    range_min: 0.20
    range_max: 12.0
    use_inf: true
