pointcloud_to_laserscan:
  ros__parameters:
    # Cloud is already frame_id "laser" (Livox patch). Avoid base_link transform when TF is flaky.
    target_frame: laser
    transform_tolerance: 0.2

    min_height: -0.15
    max_height: 0.35

    angle_min: -1.5708
    angle_max: 1.5708
    angle_increment: 0.00872665
    scan_time: 0.1

    range_min: 0.20
    range_max: 12.0
    use_inf: true

    # Livox publishes /livox/lidar as RELIABLE; default cloud_in sub is BEST_EFFORT (no data).
    qos_overrides:
      /livox/lidar.subscription:
        reliability: reliable
        history: keep_last
        depth: 256
